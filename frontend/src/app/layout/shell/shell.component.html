<mat-sidenav-container class="shell-container">
  <mat-sidenav
    [opened]="sidenavOpen()"
    mode="side"
    class="sidenav"
  >
    <div class="sidenav-header">
      <mat-icon class="app-icon">train</mat-icon>
      <span class="app-title">RailTrack</span>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="toolbar">
      <button mat-icon-button (click)="sidenavOpen.set(!sidenavOpen())" aria-label="Toggle menu">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="toolbar-spacer"></span>

      <span class="username">{{ authService.currentUser()?.username }}</span>
      <button
        mat-icon-button
        (click)="authService.logout()"
        matTooltip="Sign out"
        aria-label="Sign out"
      >
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
