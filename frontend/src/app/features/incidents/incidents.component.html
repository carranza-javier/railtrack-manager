<div class="page-header">
  <h2>Incidents</h2>
  <button mat-flat-button (click)="openCreate()">
    <mat-icon>add</mat-icon> New Incident
  </button>
</div>

@if (loading()) {
  <div class="loading-container">
    <mat-spinner diameter="48" />
  </div>
} @else {
  <div class="table-container">
    <table mat-table [dataSource]="incidents()">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let row">{{ row.title }}</td>
      </ng-container>

      <ng-container matColumnDef="severity">
        <th mat-header-cell *matHeaderCellDef>Severity</th>
        <td mat-cell *matCellDef="let row">
          <span class="severity-chip severity-{{ row.severity | lowercase }}">{{ row.severity }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <span class="status-chip status-{{ row.status | lowercase }}">{{ row.status }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="segment">
        <th mat-header-cell *matHeaderCellDef>Segment</th>
        <td mat-cell *matCellDef="let row">{{ row.trackSegmentName }}</td>
      </ng-container>

      <ng-container matColumnDef="reportedAt">
        <th mat-header-cell *matHeaderCellDef>Reported</th>
        <td mat-cell *matCellDef="let row">{{ formatDate(row.reportedAt) }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button matTooltip="Edit" (click)="openEdit(row)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Delete" (click)="openDelete(row)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>

    @if (incidents().length === 0) {
      <p class="empty-state">No incidents found.</p>
    }

    <mat-paginator
      [length]="totalElements()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[5, 10, 25]"
      (page)="onPageChange($event)"
    />
  </div>
}
